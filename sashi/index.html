<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>D&D Character Sheet - Sashi</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- Tab Navigation -->
        <div class="tabs">
            <button class="tab active" data-tab="overview">Overview</button>
            <button class="tab" data-tab="stats">Stats</button>
            <button class="tab" data-tab="combat">Combat</button>
            <button class="tab" data-tab="progression">Progression</button>
            <button class="tab" data-tab="storage">Storage</button>
        </div>

        <!-- Tab Content -->
        <section class="tab-content active" id="overview-tab">
            <!-- Overview content will go here -->
            <h1>Character Overview</h1>
            <p>Overview section</p>
        </section>
        <section class="tab-content" id="stats-tab">
            <!-- Stats content will go here -->
            <h1>Stats</h1>
            <p>Stats section</p>
        </section>
        <section class="tab-content" id="combat-tab">
            <!-- Combat content will go here -->
            <h1>Combat</h1>
            <p>Combat section</p>
        </section>
        <section class="tab-content" id="progression-tab">
            <!-- Progression content will go here -->
            <h1>Progression</h1>
            <p>Progression section</p>
        </section>
        <section class="tab-content" id="storage-tab">
            <!-- Storage content will go here -->
            <h1>Storage</h1>
            <p>Storage section</p>
        </section>
    </div>
    <script type="module" src="js/app.js"></script>
</body>
</html>
